name: CD

on:
  push:
    branches: ["main"]
    paths:
      - "**.py"
      - "src/assets/**"
      - "scripts/build_mac.sh"
      - "requirements-cd.txt"
      - "setup.py"
      - ".github/workflows/**"
  pull_request:
    branches: ["main"]
    paths:
      - "**.py"
      - "src/assets/**"
      - "scripts/build_mac.sh"
      - "requirements-cd.txt"
      - "setup.py"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  QT_QPA_PLATFORM: offscreen

jobs:
  linux-tests:
    name: Linux Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install Linux Qt runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libegl1 \
            libgl1 \
            libdbus-1-3 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cd.txt

      - name: Lint with flake8
        run: python -m flake8 ./src ./tests --count --show-source --statistics

      - name: Run tests
        run: xvfb-run -a python -m pytest tests/

  windows:
    name: Windows CD
    if: github.event_name != 'pull_request'
    needs: [linux-tests]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cd.txt

      - name: Build Windows executable
        run: python setup.py build_exe

      - name: Smoke test Windows executable in CLI mode
        shell: pwsh
        run: |
          $exePath = (Resolve-Path "build/exe.win-amd64-3.12/Drill.exe").Path
          $markerName = "drill-smoke-marker-$env:GITHUB_RUN_ID.txt"
          $markerPath = Join-Path $env:USERPROFILE "Desktop\$markerName"
          New-Item -Path $markerPath -ItemType File -Force | Out-Null
          $expectedFragment = $markerPath.ToLowerInvariant()
          $env:DRILL_EXPECT_RESULT_CONTAINS = $expectedFragment
          $env:DRILL_CLI_MAX_SECONDS = "120"
          try {
            $proc = Start-Process -FilePath $exePath -ArgumentList '--cli', $markerName -Wait -PassThru
            if ($proc.ExitCode -ne 0) {
              throw "Windows CLI smoke test failed with exit code $($proc.ExitCode)"
            }
          } finally {
            Remove-Item -Path $markerPath -Force -ErrorAction SilentlyContinue
          }

      - name: Zip Windows build
        shell: pwsh
        run: |
          $zipFile = "build/Drill-v${{ github.run_number }}-windows.zip"
          Compress-Archive -Path "build/exe.win-amd64-3.12/*" -DestinationPath $zipFile
          Write-Host "Zipped files to $zipFile"

      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Drill-windows-zip
          path: build/Drill-v${{ github.run_number }}-windows.zip
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  macos:
    name: macOS CD
    if: github.event_name != 'pull_request'
    needs: [linux-tests]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Build macOS app and dmg
        run: ./scripts/build_mac.sh

      - name: Smoke test macOS app in CLI mode
        run: |
          APP_PATH=""
          if [ -d "build/dist/Drill.app" ]; then
            APP_PATH="build/dist/Drill.app"
          elif [ -d "build/Drill.app" ]; then
            APP_PATH="build/Drill.app"
          else
            echo "No Drill.app found"
            exit 1
          fi
          APP_BIN="$APP_PATH/Contents/MacOS/Drill"
          if [ ! -x "$APP_BIN" ]; then
            echo "CLI binary not executable: $APP_BIN"
            exit 1
          fi
          export DRILL_EXPECT_RESULT_CONTAINS="/drill.app/contents/macos/drill"
          export DRILL_CLI_MAX_SECONDS="120"
          "$APP_BIN" --cli "Drill"

      - name: Zip macOS app
        run: |
          APP_PATH=""
          if [ -d "build/dist/Drill.app" ]; then
            APP_PATH="build/dist/Drill.app"
          elif [ -d "build/Drill.app" ]; then
            APP_PATH="build/Drill.app"
          else
            echo "No Drill.app found"
            exit 1
          fi
          APP_ZIP="build/Drill-v${{ github.run_number }}-macos-app.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$APP_ZIP"
          echo "Created $APP_ZIP"

      - name: Rename macOS dmg for release
        run: |
          DMG_PATH="$(ls -1 build/*.dmg | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "No DMG found"
            exit 1
          fi
          cp "$DMG_PATH" "build/Drill-v${{ github.run_number }}-macos.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Drill-macos-bundles
          path: |
            # build/Drill-v${{ github.run_number }}-macos-app.zip
            build/Drill-v${{ github.run_number }}-macos.dmg
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  linux:
    name: Linux CD
    if: github.event_name != 'pull_request'
    needs: [linux-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install Linux Qt runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libegl1 \
            libgl1 \
            libdbus-1-3 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cd.txt

      - name: Build Linux .deb
        run: ./scripts/build_linux_deb.sh "${{ github.run_number }}"

      - name: Install Linux .deb
        run: |
          sudo dpkg -i "build/Drill-v${{ github.run_number }}-linux.deb"
          command -v drill

      - name: Smoke test installed Linux CLI
        run: ./scripts/test_linux_installed_cli.sh "${{ github.run_number }}"

      - name: Upload Linux deb artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Drill-linux-deb
          path: build/Drill-v${{ github.run_number }}-linux.deb
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  release:
    name: Create Unified Release
    if: github.event_name != 'pull_request'
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4.3.0
        with:
          name: Drill-windows-zip
          path: dist/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          name: Drill-macos-bundles
          path: dist/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4.3.0
        with:
          name: Drill-linux-deb
          path: dist/linux

      - name: Show bundled files
        run: find dist -type f | sort

      - name: Create GitHub Release with all artifacts
        uses: softprops/action-gh-release@v2.2.2
        with:
          tag_name: release-${{ github.run_number }}
          name: Release ${{ github.run_number }}
          generate_release_notes: true
          files: |
            dist/windows/*.zip
            # dist/macos/*.zip
            dist/macos/*.dmg
            dist/linux/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
