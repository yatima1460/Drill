name: CD

on:
  push:
    branches: ["main"]
    paths:
      - "**.py"
      - "src/assets/**"
      - "scripts/**"
      - "requirements-cd.txt"
      - "setup.py"
      - ".github/workflows/**"
  pull_request:
    branches: ["main"]
    paths:
      - "**.py"
      - "src/assets/**"
      - "scripts/**"
      - "requirements-cd.txt"
      - "setup.py"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

jobs:
  linux-tests:
    name: Lint + Linux Qt Headless Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-cd.txt

      - name: Install Linux headless graphics deps (tests only)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libegl1 \
            libgl1 \
            libdbus-1-3 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cd.txt

      - name: Lint with flake8
        run: python -m flake8 ./src ./tests --count --show-source --statistics

      - name: Type check with pyright
        run: pyright --pythonpath python

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
          XDG_RUNTIME_DIR: /tmp/qt-runtime
        run: |
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 700 "$XDG_RUNTIME_DIR"
          xvfb-run -a python -m pytest tests/

  windows:
    name: Windows CD
    if: github.event_name != 'pull_request'
    needs: [linux-tests]
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-cd.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cd.txt

      - name: Build Windows executable
        shell: pwsh
        run: |
          $env:DRILL_VERSION = "1.0.${{ github.run_number }}"
          python setup.py build_exe

      - name: Smoke test Windows executable
        shell: pwsh
        run: |
          $exePath = (Resolve-Path "build/exe.win-amd64-3.12/Drill.exe").Path
          $env:QT_QPA_PLATFORM = "offscreen"
          $proc = $null
          try {
            $proc = Start-Process -FilePath $exePath -PassThru
            Start-Sleep -Seconds 8
            if ($proc.HasExited -and $proc.ExitCode -ne 0) {
              throw "Windows smoke test failed with exit code $($proc.ExitCode)"
            }
          } finally {
            if ($proc -and -not $proc.HasExited) {
              Stop-Process -Id $proc.Id -Force
            }
          }

      - name: Zip Windows build
        shell: pwsh
        run: |
          $zipFile = "build/Drill-v${{ github.run_number }}-windows.zip"
          Compress-Archive -Path "build/exe.win-amd64-3.12/*" -DestinationPath $zipFile
          Write-Host "Zipped files to $zipFile"

      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Drill-windows-zip
          path: build/Drill-v${{ github.run_number }}-windows.zip
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Cancel workflow on failure
        if: ${{ failure() }}
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          Invoke-RestMethod -Method Post `
            -Uri "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel" `
            -Headers @{Authorization = "Bearer $env:GITHUB_TOKEN"; Accept = "application/vnd.github+json"}

  macos:
    name: macOS CD
    if: github.event_name != 'pull_request'
    needs: [linux-tests]
    runs-on: macos-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-cd.txt

      - name: Build macOS app and dmg
        run: DRILL_VERSION=1.0.${{ github.run_number }} ./scripts/build_mac.sh

      - name: Smoke test macOS app (Qt headless)
        run: |
          APP_PATH=""
          if [ -d "build/dist/Drill.app" ]; then
            APP_PATH="build/dist/Drill.app"
          elif [ -d "build/Drill.app" ]; then
            APP_PATH="build/Drill.app"
          else
            echo "No Drill.app found"
            exit 1
          fi
          APP_BIN="$APP_PATH/Contents/MacOS/Drill"
          if [ ! -x "$APP_BIN" ]; then
            echo "App binary not executable: $APP_BIN"
            exit 1
          fi
          export QT_QPA_PLATFORM=offscreen
          set +e
          python - "$APP_BIN" <<'PY'
          import subprocess
          import sys

          app_bin = sys.argv[1]
          try:
              completed = subprocess.run([app_bin], timeout=10, check=False)
              raise SystemExit(completed.returncode)
          except subprocess.TimeoutExpired:
              raise SystemExit(124)
          PY
          status=$?
          set -e
          if [ "$status" -ne 124 ] && [ "$status" -ne 0 ]; then
            echo "macOS smoke test failed with status $status"
            exit "$status"
          fi

      - name: Zip macOS app
        run: |
          APP_PATH=""
          if [ -d "build/dist/Drill.app" ]; then
            APP_PATH="build/dist/Drill.app"
          elif [ -d "build/Drill.app" ]; then
            APP_PATH="build/Drill.app"
          else
            echo "No Drill.app found"
            exit 1
          fi
          APP_ZIP="build/Drill-v${{ github.run_number }}-macos-app.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$APP_ZIP"
          echo "Created $APP_ZIP"

      - name: Rename macOS dmg for release
        run: |
          DMG_PATH="$(ls -1 build/*.dmg | head -n 1)"
          if [ -z "$DMG_PATH" ]; then
            echo "No DMG found"
            exit 1
          fi
          cp "$DMG_PATH" "build/Drill-v${{ github.run_number }}-macos.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Drill-macos-bundles
          path: |
            # build/Drill-v${{ github.run_number }}-macos-app.zip
            build/Drill-v${{ github.run_number }}-macos.dmg
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Cancel workflow on failure
        if: ${{ failure() }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel"

  linux:
    name: Linux .deb CD
    if: github.event_name != 'pull_request'
    needs: [linux-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-cd.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-cd.txt

      - name: Build Linux .deb
        run: ./scripts/build_linux_deb.sh "${{ github.run_number }}"

      - name: Install Linux .deb
        run: |
          sudo dpkg -i "build/Drill-v${{ github.run_number }}-linux.deb"
          command -v drill

      - name: Install Linux Qt runtime libs (deb smoke test)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libdbus-1-3 \
            libxkbcommon-x11-0 \
            libxcb-cursor0

      - name: Smoke test installed Linux Qt app
        run: ./scripts/test_linux_installed_qt.sh "${{ github.run_number }}"

      - name: Upload Linux deb artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Drill-linux-deb
          path: build/Drill-v${{ github.run_number }}-linux.deb
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Cancel workflow on failure
        if: ${{ failure() }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel"

  arch:
    name: Linux Arch CD
    if: github.event_name != 'pull_request'
    needs: [linux-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Arch build/runtime dependencies
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel \
            sudo \
            python \
            python-pyqt6 \
            python-pip \
            python-setuptools \
            python-wheel \
            libxkbcommon-x11 \
            dbus \
            mesa \
            xorg-server-xvfb \
            git

      - name: Build Arch package
        run: |
          id -u builder >/dev/null 2>&1 || useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          runuser -u builder -- bash -lc "
            cd \"$GITHUB_WORKSPACE\"
            python -m venv .venv
            . .venv/bin/activate
            python -m pip install --upgrade pip
            pip install -r requirements-cd.txt
            PYTHON_BIN=.venv/bin/python ./scripts/build_arch_pkg.sh \"${{ github.run_number }}\"
          "

      - name: Install Arch package
        run: |
          PKG_FILE="$(find build/arch -maxdepth 1 -type f -name 'drill-bin-1.0.${{ github.run_number }}-1-x86_64.pkg.tar.*' | head -n 1)"
          if [ -z "$PKG_FILE" ]; then
            echo "Built Arch package not found in build/arch"
            exit 1
          fi
          pacman -U --noconfirm "$PKG_FILE"

      - name: Smoke test installed Arch Qt app
        run: |
          runuser -u builder -- bash -lc "
            cd \"$GITHUB_WORKSPACE\"
            ./scripts/test_arch_installed_qt.sh \"${{ github.run_number }}\"
          "

      - name: Upload Arch package artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Drill-arch-pkg
          path: build/arch/drill-bin-1.0.${{ github.run_number }}-1-x86_64.pkg.tar.*
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

      - name: Cancel workflow on failure
        if: ${{ failure() }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel"

