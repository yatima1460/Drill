  release:
    name: Create Unified Release
    if: github.event_name != 'pull_request'
    needs: [windows, macos, linux, arch]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: Drill-windows-zip
          path: dist/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: Drill-macos-bundles
          path: dist/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: Drill-linux-deb
          path: dist/linux

      - name: Download Arch artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: Drill-arch-pkg
          path: dist/arch

      # - name: Download RPM artifact
      #   uses: actions/download-artifact@v8.0.1
      #   with:
      #     name: Drill-linux-rpm
      #     path: dist/rpm

      - name: Show bundled files
        run: find dist -type f | sort

      - name: Create GitHub Release with all artifacts
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: release-${{ github.run_number }}
          name: Release ${{ github.run_number }}
          generate_release_notes: true
          files: |
            dist/windows/*.zip
            # dist/macos/*.zip
            dist/macos/*.dmg
            dist/linux/*.deb
            dist/arch/*.pkg.tar.*
            dist/rpm/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
